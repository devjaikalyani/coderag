[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "integration: marks tests that require model downloads or API keys",
    "slow: marks tests that take a long time",
]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "scripts/*", "ui/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
